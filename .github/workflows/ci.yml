name: CI
run-name: "branch:${{ github.head_ref || github.ref_name }} | msg:${{ github.event.head_commit.message || github.event.pull_request.title }}"

on:
    push:
        branches: [main, develop]
    pull_request:
        branches: [main, develop]

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

env:
    FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
    CI:
        name: CI
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v5

            - name: Setup Node.js
              uses: actions/setup-node@v5
              with:
                  node-version: 24
                  cache: "npm"

            - name: Install dependencies
              run: npm ci

            - name: Setup mise
              uses: jdx/mise-action@v4.0.1
              with:
                  install: true
                  cache: true

            - name: Check Formatting (StyLua)
              run: stylua --check .

            - name: Check Formatting (Prettier)
              run: npx prettier --check .

            - name: Run Tests
              run: mise run tests
