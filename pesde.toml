name = "scope/scope"
version = "0.1.0"
license = "MIT"

[target]
environment = "roblox"

[wally_indices]
default = "https://github.com/UpliftGames/wally-index"

[indices]
default = "https://github.com/pesde-pkg/index"

[scripts]
roblox_sync_config_generator = ".pesde/scripts/roblox_sync_config_generator.luau"
sourcemap_generator = ".pesde/scripts/sourcemap_generator.luau"

[dev_dependencies]
scripts = { name = "pesde/scripts_rojo", version = "^0.2.0", target = "lune" }
rojo = { name = "pesde/rojo", version = "^7.5.1", target = "lune" }
uilabs = { wally = "pepeeltoro41/ui-labs", version = "^2.4.2" }

[engines]
pesde = "^0.7.0"
lune = "^0.10.2"

[dependencies]
conch = { wally = "alicesaidhi/conch", version = "^0.3.1" }
conch_ui = { wally = "alicesaidhi/conch-ui", version = "^0.3.1" }
vide = { wally = "cayasde/vide-opinionated", version = "^0.4.3" }
rng = { wally = "ernisto/rng", version = "^1.0.0-rc.3" }
profilestore = { wally = "lm-loleris/profilestore", version = "^1.0.3" }
topbarplus = { wally = "1foreverhd/topbarplus", version = "^3.4.0" }
quickzone = { wally = "ldgerrits/quickzone", version = "^1.2.0" }
